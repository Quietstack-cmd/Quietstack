name: Build & publish Quietstack

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer le site
        run: python scripts/build.py

      - name: Commit et push si changement
        run: |
          git config user.name "quietstack-bot"
          git config user.email "actions@github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Build automatique du site ($(date -u +'%Y-%m-%d'))"
          git push
